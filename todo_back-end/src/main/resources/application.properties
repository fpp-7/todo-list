spring.application.name=to-do it
spring.config.import=optional:file:.env[.properties],optional:file:todo_back-end/.env[.properties]

# Conexao com o Banco de Dados PostgreSQL
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/tarefas_db}
spring.datasource.username=${DB_USERNAME:admin}
spring.datasource.password=${DB_PASSWORD:postgres123}

# Indentacao do JSON
spring.jackson.serialization.indent_output=true

# Configuracoes do JPA e Hibernate
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:validate}
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0

# Chave de seguranca do JWT
api.security.token.secret=${JWT_SECRET}
api.security.token.expiration-minutes=${JWT_EXPIRATION_MINUTES:15}
app.security.refresh-token.expiration-days=${REFRESH_TOKEN_EXPIRATION_DAYS:7}
app.security.password-reset.expiration-minutes=${PASSWORD_RESET_EXPIRATION_MINUTES:30}
app.security.cookie.access-name=${ACCESS_TOKEN_COOKIE_NAME:todo_access_token}
app.security.cookie.refresh-name=${REFRESH_TOKEN_COOKIE_NAME:todo_refresh_token}
app.security.cookie.secure=${SECURE_COOKIES:false}
app.security.cookie.same-site=${COOKIE_SAME_SITE:Lax}
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:4200,http://127.0.0.1:4200}
app.frontend.url=${APP_FRONTEND_URL:http://localhost:4200}
app.mail.from=${APP_MAIL_FROM:no-reply@todo.local}
app.upload.profile-photos-dir=${PROFILE_PHOTOS_DIR:.data/profile-photos}
app.upload.profile-photo-max-bytes=${PROFILE_PHOTO_MAX_BYTES:2097152}
app.logging.dir=${APP_LOG_DIR:.logs}
app.logging.root-level=${ROOT_LOG_LEVEL:INFO}
app.logging.app-level=${APP_LOG_LEVEL:INFO}
app.logging.sql-level=${SQL_LOG_LEVEL:WARN}
