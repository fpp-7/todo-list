spring.datasource.url=jdbc:h2:mem:todoit;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0
api.security.token.secret=test-secret-token
api.security.token.expiration-minutes=15
app.security.refresh-token.expiration-days=7
app.security.password-reset.expiration-minutes=30
app.cors.allowed-origins=http://localhost:4200,http://127.0.0.1:4200
app.frontend.url=http://localhost:4200
app.mail.from=no-reply@todo.local
