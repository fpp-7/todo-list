version: '3.8'
services:
  db:
    image: postgres:15
    container_name: tarefas-db
    restart: always
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=admin
      - POSTGRES_PASSWORD=postgres123
      - POSTGRES_DB=tarefas_db
    volumes:
      - postgres_data:/var/lib/postgresql/data


  scrum-ui:
    build: ./scrum-ui
    container_name: scrum-ui
    ports:
      - 4200:80
    links:
      - scrum-app

volumes:
  postgres_data: