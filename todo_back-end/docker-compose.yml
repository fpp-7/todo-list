services:
  todo-db:
    image: postgres:15
    container_name: todo-db
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: postgres123
      POSTGRES_DB: tarefas_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d tarefas_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  todo-backend:
    build:
      context: .
    container_name: todo-backend
    env_file:
      - .env
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      DB_URL: jdbc:postgresql://todo-db:5432/tarefas_db
      DB_USERNAME: admin
      DB_PASSWORD: postgres123
      JWT_SECRET: ${JWT_SECRET:?Set JWT_SECRET in todo_back-end/.env}
      JWT_EXPIRATION_MINUTES: ${JWT_EXPIRATION_MINUTES:-15}
      REFRESH_TOKEN_EXPIRATION_DAYS: ${REFRESH_TOKEN_EXPIRATION_DAYS:-7}
      PASSWORD_RESET_EXPIRATION_MINUTES: ${PASSWORD_RESET_EXPIRATION_MINUTES:-30}
      SECURE_COOKIES: ${SECURE_COOKIES:-false}
      COOKIE_SAME_SITE: ${COOKIE_SAME_SITE:-Lax}
      APP_FRONTEND_URL: ${APP_FRONTEND_URL:-http://localhost:4200}
      APP_MAIL_FROM: ${APP_MAIL_FROM:-no-reply@todo.local}
      APP_CORS_ALLOWED_ORIGINS: http://localhost:4200,http://127.0.0.1:4200
      PROFILE_PHOTOS_DIR: /app/uploads/profile-photos
      SPRING_JPA_HIBERNATE_DDL_AUTO: validate
    volumes:
      - profile_photos:/app/uploads/profile-photos
    depends_on:
      todo-db:
        condition: service_healthy

  todo-frontend:
    build:
      context: ../todo_front-end/todo-list
    container_name: todo-frontend
    restart: unless-stopped
    ports:
      - "4200:4200"
    depends_on:
      - todo-backend

volumes:
  postgres_data:
  profile_photos:
